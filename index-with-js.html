<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />

    <!-- Title -->
    <title>Circular Carousel | Only CSS</title>

    <!-- Basic SEO -->
    <meta name="description" content="" />
    <meta name="keywords" content="css,carousel," />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Circular Carousel | Only CSS" />
    <meta property="og:description" content="" />
    <!-- <meta property="og:image" content={image} /> -->
    <meta property="og:site_name" content="Circular Carousel | Only CSS" />
    <meta property="og:locale" content="en" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Circular Carousel | Only CSS" />
    <meta name="twitter:description" content="" />
    <!-- <meta name="twitter:image" content={image} /> -->

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="./src/styles.css" rel="stylesheet" />
  </head>

  <body class="p-8">
    <main class="p-1 mx-auto relative">
      <h1 class="text-3xl font-bold text-center mb-2">Circular Carousel</h1>
      <p class="mb-4 text-center">Circular style carousel built using Tailwind CSS and Javascript.</p>
      <div class="carousel-container mb-4">
        <div class="w-full min-h-full flex justify-center items-center md:gap-6 slide-visibility-1">
          <!-- Left controls -->
          <div class="absolute top-[calc(50%-1.75rem)] -left-8 md:relative z-30">
            <button disabled id="back-button" aria-label="Back" class="hover:scale-120 transition-all duration-500 disabled:cursor-not-allowed disabled:opacity-50">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-right-icon lucide-chevron-right w-10 h-10 text-blue-300 md:text-red-500 rotate-180"><path d="m9 18 6-6-6-6" /></svg>
            </button>
          </div>

          <!-- Carousel content -->
          <div class="max-w-100 w-full bg-blue-500/60 relative rounded-4xl overflow-hidden shadow-lg shadow-black/30 flex flex-col">
            <!-- Carousel images -->
            <div id="images-container" class="grid grid-cols-3 z-10 scale-300 lg:scale-300 -translate-y-full bg-red-500/90 rounded-full overflow-hidden images-container relative">
              <div class="absolute z-10 inset-1 rounded-full outline-decoration border border-dashed border-gray-200"></div>
              
            </div>

            <!-- Carousel texts -->
            <div id="texts-container" class="grid grid-cols-4 w-[calc(100%*4)] mt-6 texts-container pb-6 z-30">
              
            </div>
          </div>

          <!-- Right controls -->
          <div class="absolute top-[calc(50%-1.75rem)] -right-8 md:relative z-30">
            <button id="next-button" aria-label="Next" class="hover:scale-120 transition-all duration-500 disabled:cursor-not-allowed disabled:opacity-50">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-right-icon lucide-chevron-right w-10 h-10 text-blue-300 md:text-red-500"><path d="m9 18 6-6-6-6" /></svg>
            </button>
          </div>
        </div>
      </div>
      <p class="mb-4 text-center">For Only CSS version, you can check <a class="text-sky-500" href="index.html">here</a>.</p>
    </main>
    <script src="./src/main.js"></script>
  </body>
</html>
